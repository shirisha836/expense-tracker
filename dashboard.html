<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xpenza — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="top-left">
      <div class="brand-small">Xpenza</div>
    </div>

    <div class="top-right">
      <a href="profile.html" class="btn small muted">Profile</a>
      <button id="logoutBtn" class="btn small primary">Logout</button>
    </div>
  </header>

  <main class="center">
    <section class="glass-card dashboard-card">

      <!-- STATS ROW -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-title">This Month</div>
          <div class="stat-value" id="stat-month">₹0.00</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Today</div>
          <div class="stat-value" id="stat-today">₹0.00</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Top Category</div>
          <div class="stat-value" id="stat-top">—</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Budget Left</div>
          <div class="stat-value" id="stat-budget">₹0.00</div>
        </div>
      </div>

      <!-- COLLAPSIBLE FILTERS -->
      <div class="filters-toggle">
        <button id="toggleFilters" class="btn muted small">Show Filters ▾</button>
      </div>
      <div class="filters-panel" id="filtersPanel" aria-hidden="true">
        <div class="filters-row">
          <input id="searchText" placeholder="Search name or category..." />
          <select id="filterCategory">
            <option value="all">All categories</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
          </select>
          <input id="dateFrom" type="date" />
          <input id="dateTo" type="date" />
          <button id="applyFilters" class="btn muted">Apply</button>
          <button id="clearFilters" class="btn muted">Clear</button>
        </div>
      </div>

      <!-- TWO-COLUMN WORKSPACE -->
      <div class="workspace">
        <!-- LEFT: Form + List -->
        <div class="left-panel">
          <h3 class="section-title">Add Expense</h3>

          <div class="quick-add">
            <input id="expense-name" type="text" placeholder="Expense name (e.g., Coffee)" />
            <input id="expense-amount" type="number" step="0.01" placeholder="Amount (₹)" />
            <select id="expense-category">
              <option value="Food">🍴 Food</option>
              <option value="Travel">🚗 Travel</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Bills">💡 Bills</option>
              <option value="Other">✨ Other</option>
            </select>

            <div class="btn-row">
              <button id="add-btn" class="btn primary">Add Expense</button>
              <button id="clear-btn" class="btn muted">Clear All</button>
              <button id="exportBtn" class="btn muted">Export CSV</button>
            </div>
          </div>

          <div class="summary">
            <h4 class="total">Total: <span id="total">₹0.00</span></h4>
            <ul id="expense-list" class="expense-list"></ul>
          </div>
        </div>

        <!-- RIGHT: Chart & Budget -->
        <div class="right-panel">
          <h3 class="section-title">Spending Overview</h3>

          <div class="chart-card">
            <canvas id="expenseChart" width="360" height="360"></canvas>
          </div>

          <div class="budget-block">
            <input id="budget-input" type="number" placeholder="Set monthly budget (₹)" />
            <div class="btn-row" style="margin-top:8px;">
              <button id="set-budget" class="btn primary">Set Budget</button>
              <div id="budget-warning" class="budget-warning" aria-live="polite"></div>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="dashboard.js"></script>

  <!-- PAGE PROTECTION + LOGOUT -->
  <script>
    if (localStorage.getItem("isLoggedIn") !== "true") {
      window.location.href = "index.html"; // redirect to your actual login filename
    }
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "index.html";
    });
  </script>
  <!-- XPENZA SASSY BOT: floating bubble + chat window -->
<!-- Place this near the end of dashboard.html (before closing body) -->
<div id="xpenza-bot">
  <button id="xpb-toggle" aria-label="Open Xpenza Buddy">
    <img id="xpb-avatar" src="assets/bot.jpg" alt="Xpenza Bot">


  </button>

  <aside id="xpb-panel" aria-hidden="true">
    <header class="xpb-header">
      <div class="xpb-title">XpensaBuddy ✨</div>
      <div class="xpb-sub">Sassy finance coach (roast included)</div>
      <button id="xpb-close" class="xpb-icon">✖</button>
    </header>
        <!-- Personality Selector -->
    <select id="xpb-mood" class="xpb-mood-select"
      style="margin:10px 12px; padding:10px; border-radius:10px;
      background:rgba(255,255,255,0.05); color:#efeaff;
      border:1px solid rgba(255,255,255,0.08); width:calc(100% - 24px);">
      
      <option value="savage">🔥 Savage Gen-Z</option>
      <option value="sweet">💗 Sweet Supportive</option>
      <option value="balanced">✨ Balanced Sassy</option>
      <option value="chaotic">😈 Chaotic Gremlin</option>
      <option value="pro">📘 Professional</option>
    </select>


    <div id="xpb-messages" class="xpb-messages" role="log" aria-live="polite"></div>

    <div class="xpb-actions">
      <button id="xpb-analyze" class="btn small muted">Analyze my spending</button>
      <button id="xpb-tip" class="btn small muted">Give me a tip</button>
    </div>

    <form id="xpb-form" class="xpb-form" action="javascript:;">
      <input id="xpb-input" placeholder="Say something to your roast buddy..." autocomplete="off">
      <button id="xpb-send" class="btn small primary">Send</button>
    </form>
  </aside>
</div>

<!-- load bot script -->
<script src="bot.js"></script>

</body>
</html>
